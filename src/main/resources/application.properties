spring.application.name=app

# 1. Oracle Connection URL
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=system
spring.datasource.password=leang30122006
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 2. Hibernate Settings
# Changed to 'create' to ensure a fresh start; use 'update' once stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Oracle Dialect
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# 4. Critical Fixes for Sequence & Naming (The Missing Part)
# This prevents Hibernate from looking for a default "hibernate_sequence"
spring.jpa.properties.hibernate.id.db_structure_naming_strategy=legacy
# Maps Java camelCase to Database UNDER_SCORES
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Keeps the connection alive during long idling
spring.datasource.hikari.connection-timeout=30000